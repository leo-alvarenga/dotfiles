use-damage          = false
backend             = "glx"
vsync               = true
unredir-if-possible = false
#xrender-sync-fence = false


animations = true

# available trasitions
# `slide-up`, `none`, `slide-up`, `zoom`,
# `slide-down`, `slide-up`, `slide-left`,
# `slide-right` `slide-up`, `slide-up`

animation-for-transient-window     = "zoom"
animation-for-open-window          = "slide-left"
animation-for-unmap-window         = "zoom"
animation-for-menu-window          = "zoom"
animation-for-workspace-switch-out = "zoom"
animation-for-workspace-switch-in  = "slide-left"
animation-stiffness                = 600
animation-dampening                = 30
animation-window-mass              = 0.5
animation-clamping                 = false
animation-delta                    = 16

# animation-force-steps = true

# Corner Radius
corner-radius = 0
round-borders = 0
rounded-corners-exclude = [
  #"window_type = 'normal'",
  "class_g = 'Polybar'",
]

opacity-rule = [
  "95:class_g = 'code-oss'",
  "90:class_g = 'discord'",
]

# Blur
#blur-background = true
#blur-background-frame = true
#blur-background-fixed = true
#blur-method = "dual_kawase"
#blur-strength = 5
#
#blur-background-exclude = [
#  "class_g = 'Polybar'",
#]

shadow          = true
shadow-radius   = 6
shadow-offset-x = -5
shadow-offset-y = -5
shadow-opacity  = 0.5
shadow-exclude  = [
  "class_g = 'Polybar'"
]