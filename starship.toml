# Starship Config - Kanagawa Wave Theme
# Clean, minimal, keyboard-focused workflow

# Prompt format - pill-shaped like tmux status-right
# Structure: [](mini-pill: dir)[git|node|pkg|docker][accent: duration]
format = """
[ŅéČ](fg:surface)\
$directory\
$nodejs\
$lua\
$docker_context\
$git_branch\
$git_status\
$cmd_duration\
[Ņé┤](fg:surface)\
$character\
"""

# Kanagawa Wave color palette
palette = "kanagawa"

[palettes.kanagawa]
bg = "#1F1F28"
surface = "#363646"
git_bg = "#363646"
lang_bg = "#223249"
fg = "#DCD7BA"
fg_dim = "#727169"
blue = "#7E9CD8"
green = "#76946A"
yellow = "#C0A36E"
orange = "#FFA066"
red = "#C34043"
magenta = "#957FB8"
cyan = "#7AA89F"

# Directory - shows current path
[directory]
truncation_symbol = "ŌĆ”/"
format = "[$path ]($style)"
style = "fg:blue bg:surface"
fish_style_pwd_dir_length = 1

# Git branch
[git_branch]
symbol = "’Éś"
truncation_length = 16
truncation_symbol = "ŌĆ”"
style = "fg:red bg:surface"
format = "[[|](fg:magenta bg:surface) $symbol $branch ]($style)"

# Git status - minimal with semantic colors
[git_status]
style = "bold bg:surface bg:surface"
format = "[[|](fg:magenta bg:surface)$all_status$ahead_behind ]($style)"
conflicted = "[ Ņ»”](fg:red bg:surface bold)"
ahead = "[ Ņ½ā ${count}](fg:green bg:surface bold)"
behind = "[ Ņ½é ${count}](fg:red bg:surface bold)"
diverged = "[ ŌćĢ Ņ½ā ${ahead_count}Ņ½é ${behind_count}](fg:yellow bg:surface bold)"
up_to_date = "[ ¾░ģĀ](fg:green bg:surface bold)"
untracked = "[ ¾▒ĆČ ${count}](fg:yellow bg:surface bold)"
stashed = "[ ¾░┤« ${count}](fg:cyan bg:surface bold)"
modified = "[ Ņ░ī ${count}](fg:orange bg:surface bold)"
staged = "[ ’ōÉ ${count}](fg:blue bg:surface bold)"
renamed = "[ ┬╗ ${count}](fg:magenta bg:surface bold bg:surface)"
deleted = "[ ¾░å┤ ${count}](fg:red bg:surface bold)"

# Node.js version
[nodejs]
symbol = "Ņ┤Ź "
style = "fg:green bg:surface"
detect_folders = ["node_modules"]
version_format = "v${major}.${minor}"
format = "[[|](fg:magenta bg:surface) $symbol($version) ]($style)"
detect_extensions = ["js", "mjs", "cjs", "ts", "mts", "cts"]
detect_files = ["package.json", ".node-version", ".nvmrc"]

[lua]
symbol = "¾░ó▒ "
disabled = false
style = "fg:blue bg:surface bold"
version_format = "v${major}.${minor}"
format = "[[|](fg:magenta bg:surface) $symbol($version )]($style)"

# Package version (from package.json)
[package]
disabled = true

# Docker context
[docker_context]
symbol = "’ł¤ "
style = "fg:blue bg:surface"
format = "[[|](fg:magenta bg:surface) $symbol$context ]($style)"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []

# Command duration - accent section (like tmux time)
[cmd_duration]
min_time = 2000
style = "fg:magenta bg:surface"
format = "[[|](fg:magenta bg:surface) $duration ]($style)"

# Prompt character - changes with vi mode
[character]
success_symbol = "[ ŌØ»](bold green)"
error_symbol = "[ ŌØ»](bold red)"
vimcmd_symbol = "[ ŌØ«](bold green)"
vimcmd_visual_symbol = "[ ŌØ«](bold yellow)"
vimcmd_replace_symbol = "[ ŌØ«](bold magenta)"

# Line break before character
[line_break]
disabled = false

# Disable modules we don't need
[golang]
disabled = true

[kubernetes]
disabled = true

[aws]
disabled = true

[gcloud]
disabled = true

[time]
disabled = true

[username]
disabled = true

[hostname]
disabled = true
